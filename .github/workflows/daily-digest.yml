name: Daily Digest

on:
  schedule:
    # Run daily at 01:00 UTC (08:00 Vietnam time), after agents-radar finishes (~00:25 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD). Leave empty for backfill mode.'
        required: false
      backfill_days:
        description: 'Backfill: how many past days to check (default 30, ignored if date is set).'
        required: false
        default: '30'

jobs:
  digest:
    name: Generate Daily Digest
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # wrangler is needed for R2 cover image uploads
      - run: pnpm add -g wrangler

      - name: Run digest pipeline
        env:
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          COVER_IMAGE_BASE_URL: ${{ secrets.COVER_IMAGE_BASE_URL }}
          COVER_IMAGE_API_KEY: ${{ secrets.COVER_IMAGE_API_KEY }}
          COVER_IMAGE_MODEL: ${{ secrets.COVER_IMAGE_MODEL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          BACKFILL_DAYS="${{ github.event.inputs.backfill_days }}"
          BACKFILL_DAYS="${BACKFILL_DAYS:-30}"
          if [ -z "$DATE" ]; then
            # Scheduled/backfill run: check last N days to recover from LLM outages
            echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "🔄 Backfill mode: checking last ${BACKFILL_DAYS} days for missed digests"
            npx tsx lib/smart-digest/main.ts --backfill="${BACKFILL_DAYS}"
          else
            echo "DATE=$DATE" >> "$GITHUB_ENV"
            echo "📅 Generating digest for $DATE"
            npx tsx lib/smart-digest/main.ts "$DATE"
          fi

      - name: Collect cover images
        if: always()
        run: |
          mkdir -p artifacts/images
          cp /tmp/digest-cover-*.png artifacts/images/ 2>/dev/null || true
          cp /tmp/digest-cover-*.webp artifacts/images/ 2>/dev/null || true
          ls -lh artifacts/images/ 2>/dev/null || echo "No cover images found"

      - name: Upload extracted content
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-content-${{ env.DATE }}
          path: lib/smart-digest/data/digest-*.json
          if-no-files-found: ignore

      - name: Upload cover images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-images-${{ env.DATE }}
          path: artifacts/images/
          if-no-files-found: ignore
